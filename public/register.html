<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Sleepy UD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="logo">Sleepy UD</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/pricing.html">Pricing</a></li>
      <li><a href="/login.html" class="nav-cta">Dashboard</a></li>
    </ul>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card fade-in">
    <h2>Create account</h2>
    <p class="subtitle">Register to access your dashboard and manage licenses.</p>

    <div id="alert" class="alert"></div>

    <form id="register-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      <div class="form-footer">Already have an account? <a href="/login.html">Sign in</a></div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/api.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const alert = document.getElementById('alert');
  try {
    const data = await post('/api/auth/register', { username, password, email });
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = '/dashboard/customer.html';
  } catch (err) {
    alert.className = 'alert error';
    alert.textContent = err.message;
  }
});

if (isLoggedIn()) {
  const user = getUser();
  if (user) window.location.href = `/dashboard/${user.role === 'owner' ? 'owner' : 'customer'}.html`;
}
</script>
</body>
</html>
