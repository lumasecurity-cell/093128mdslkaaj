<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sleepy UD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="logo">Sleepy UD</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/pricing.html">Pricing</a></li>
      <li><a href="/login.html" class="active nav-cta">Dashboard</a></li>
    </ul>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card fade-in">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your dashboard or use your license key.</p>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('key')">Key Login</button>
    </div>

    <div id="alert" class="alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      <div class="form-footer">Don't have an account? <a href="/register.html">Register</a></div>
    </form>

    <form id="key-form" style="display:none">
      <div class="form-group">
        <label>License Key</label>
        <input type="text" id="license-key" placeholder="XXXXXXXX-XXXXXXXX-XXXXXXXX-XXXXXXXX" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Authenticate with Key</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/api.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[tab === 'login' ? 0 : 1].classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('key-form').style.display = tab === 'key' ? '' : 'none';
  document.getElementById('alert').className = 'alert';
}

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const alert = document.getElementById('alert');
  try {
    const data = await post('/api/auth/login', { username, password });
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    const dest = data.user.role === 'owner' ? '/dashboard/owner.html' : '/dashboard/customer.html';
    window.location.href = dest;
  } catch (err) {
    alert.className = 'alert error';
    alert.textContent = err.message;
  }
}

async function handleKeyLogin(e) {
  e.preventDefault();
  const key = document.getElementById('license-key').value;
  const alert = document.getElementById('alert');
  try {
    const data = await post('/api/auth/key-login', { key });
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = '/dashboard/customer.html';
  } catch (err) {
    alert.className = 'alert error';
    alert.textContent = err.message;
  }
}

document.getElementById('login-form').addEventListener('submit', handleLogin);
document.getElementById('key-form').addEventListener('submit', handleKeyLogin);

if (isLoggedIn()) {
  const user = getUser();
  if (user) window.location.href = `/dashboard/${user.role === 'owner' ? 'owner' : 'customer'}.html`;
}
</script>
</body>
</html>
