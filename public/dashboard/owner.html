<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Dashboard — Sleepy UD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="logo">Sleepy UD</a>
    <ul class="nav-links" id="nav-links"></ul>
  </div>
</nav>

<div class="dashboard">
  <div class="container">
    <div class="dash-header">
      <div>
        <h1>Owner Dashboard</h1>
        <p>Manage license keys and view system statistics</p>
      </div>
      <button class="btn btn-outline btn-sm" onclick="logout()" style="color:var(--red);border-color:rgba(248,113,113,.3)">Logout</button>
    </div>

    <div class="stats-grid" id="stats-grid"></div>

    <div class="dash-card fade-in">
      <h3>🔑 Generate Keys</h3>
      <form id="gen-form" style="display:grid;grid-template-columns:1fr 1fr 120px;gap:16px;align-items:end">
        <div class="form-group" style="margin:0">
          <label>Product</label>
          <select id="gen-product" required>
            <option value="Woofer">Woofer</option>
            <option value="NOXY VGC">NOXY VGC</option>
            <option value="Complete Bundle">Complete Bundle</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label>Duration</label>
          <select id="gen-duration">
            <option value="30">30 Days</option>
            <option value="90">90 Days</option>
            <option value="">Lifetime</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="padding:12px 16px">Generate</button>
      </form>
      <div id="gen-result" style="margin-top:12px;display:none"></div>
    </div>

    <div class="dash-card fade-in">
      <h3>📋 All License Keys</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Key</th>
              <th>Product</th>
              <th>User</th>
              <th>Status</th>
              <th>HWID</th>
              <th>Created</th>
              <th>Expires</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="keys-table"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/api.js"></script>
<script>
if (!isLoggedIn()) { window.location.href = '/login.html'; }

const user = getUser();
if (user && user.role !== 'owner') { window.location.href = '/dashboard/customer.html'; }

async function loadStats() {
  try {
    const s = await get('/api/keys/stats');
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card fade-in"><div class="stat-value">${s.total}</div><div class="stat-label">Total Keys</div></div>
      <div class="stat-card fade-in"><div class="stat-value" style="color:var(--green)">${s.active}</div><div class="stat-label">Active</div></div>
      <div class="stat-card fade-in"><div class="stat-value" style="color:var(--baby)">${s.unused}</div><div class="stat-label">Unused</div></div>
      <div class="stat-card fade-in"><div class="stat-value" style="color:var(--orange)">${s.expired}</div><div class="stat-label">Expired</div></div>
      <div class="stat-card fade-in"><div class="stat-value" style="color:var(--red)">${s.banned}</div><div class="stat-label">Banned</div></div>
      <div class="stat-card fade-in"><div class="stat-value">${s.users}</div><div class="stat-label">Customers</div></div>
    `;
  } catch (e) { showToast('Failed to load stats', 'error'); }
}

async function loadKeys() {
  try {
    const keys = await get('/api/keys/all');
    const tbody = document.getElementById('keys-table');
    if (!keys.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:32px">No keys generated yet</td></tr>';
      return;
    }
    tbody.innerHTML = keys.map(k => {
      const statusClass = `status-${k.status}`;
      const created = new Date(k.created_at).toLocaleDateString();
      const expires = k.expires_at ? new Date(k.expires_at).toLocaleDateString() : 'Lifetime';
      return `
        <tr>
          <td style="font-family:monospace;font-size:.82rem">${k.key}</td>
          <td>${k.product}</td>
          <td>${k.assigned_user || '—'}</td>
          <td><span class="status-badge ${statusClass}">${k.status}</span></td>
          <td style="font-family:monospace;font-size:.78rem;color:var(--text-muted)">${k.hwid || '—'}</td>
          <td>${created}</td>
          <td>${expires}</td>
          <td>
            <select onchange="updateStatus(${k.id}, this.value)" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px;font-size:.8rem">
              <option value="unused" ${k.status==='unused'?'selected':''}>Unused</option>
              <option value="active" ${k.status==='active'?'selected':''}>Active</option>
              <option value="expired" ${k.status==='expired'?'selected':''}>Expired</option>
              <option value="banned" ${k.status==='banned'?'selected':''}>Banned</option>
            </select>
          </td>
        </tr>
      `;
    }).join('');
  } catch (e) { showToast('Failed to load keys', 'error'); }
}

async function updateStatus(id, status) {
  try {
    await patch(`/api/keys/${id}/status`, { status });
    showToast('Status updated');
  } catch (e) { showToast(e.message, 'error'); }
}

document.getElementById('gen-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const product = document.getElementById('gen-product').value;
  const duration = parseInt(document.getElementById('gen-duration').value) || null;
  const btn = e.target.querySelector('button');
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  btn.disabled = true;
  try {
    const data = await post('/api/keys/generate', { product, duration_days: duration, quantity: 1 });
    const result = document.getElementById('gen-result');
    result.style.display = 'block';
    result.innerHTML = `<div class="alert success">Generated: <strong style="font-family:monospace">${data.keys[0]}</strong></div>`;
    loadKeys();
    loadStats();
  } catch (err) {
    showToast(err.message, 'error');
  }
  btn.innerHTML = 'Generate';
  btn.disabled = false;
});

loadStats();
loadKeys();
</script>
</body>
</html>
